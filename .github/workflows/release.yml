# Versions packages via Changesets (opens/updates a Version PR).
# Does NOT publish to npm — that happens only in publish.yml on a version tag.

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version packages (Changesets)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: make deps-ci

      - name: Build packages
        run: make build

      - name: Create Version Pull Request
        uses: changesets/action@v1
        with:
          # Version only — do not pass `publish` (that would push to npmjs).
          version: make version
          title: 'Release: Version Packages'
          commit: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Reminder — publish via tag
        run: |
          echo "Changesets manages version bumps only."
          echo "After merging the Version Packages PR, publish with:"
          echo "  git tag v\$(node -p \"require('./packages/core/package.json').version\")"
          echo "  git push origin --tags"
          echo "→ publish.yml will publish to npmjs."
