# CI: lint, build, test, dry-run pack checks.
# Never publishes to npm (no registry-url, no NPM_TOKEN).

name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: make deps-ci

      - name: CI checks
        run: make ci

      - name: Check for changeset files
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -d ".changeset" ] || [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "⚠️ No changeset files found."
            echo "Consider adding one with: npx changeset add"
            echo "This is not blocking, but recommended for tracking changes."
          else
            echo "✅ Changeset files found"
          fi
